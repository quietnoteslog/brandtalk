<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>브랜드톡 이미지 검색</title>
<link rel="icon" href="/static/logo.png">
<link rel="apple-touch-icon" href="/static/logo.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #141414; color: #f0f0f0; font-family: -apple-system, sans-serif; }

header {
  background: #1e1e1e;
  padding: 14px 16px 10px;
  position: sticky; top: 0; z-index: 10;
  border-bottom: 1px solid #333;
}
header h1 { font-size: 15px; color: #e85d8a; margin-bottom: 10px; }

.row { display: flex; gap: 8px; margin-bottom: 8px; }

input[type=text] {
  flex: 1; background: #2a2a2a; color: #f0f0f0;
  border: none; border-radius: 8px; padding: 10px 12px;
  font-size: 15px; outline: none;
}
input[type=text]::placeholder { color: #666; }

select {
  background: #2a2a2a; color: #f0f0f0;
  border: none; border-radius: 8px; padding: 9px 10px;
  font-size: 13px; outline: none; flex: 1;
}

button {
  background: #e85d8a; color: white; border: none;
  border-radius: 8px; padding: 10px 16px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
button.sec { background: #2a2a2a; color: #ccc; }
button.sec:active { background: #3a3a3a; }
button:active { opacity: 0.8; }

.engine-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.engine-tabs button {
  flex: 1; padding: 8px; font-size: 13px; font-weight: 600;
  border-radius: 8px; background: #2a2a2a; color: #888;
}
.engine-tabs button.active { background: #e85d8a; color: white; }

.meta-row { display: flex; gap: 8px; align-items: center; }

#status {
  padding: 6px 16px; font-size: 12px; color: #888;
  min-height: 24px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  padding: 0 3px;
}

.thumb-wrap {
  position: relative;
  aspect-ratio: 1;
  background: #222;
  overflow: hidden;
  cursor: pointer;
}
.thumb-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.thumb-wrap.saved::after {
  content: "✓";
  position: absolute; inset: 0;
  background: rgba(76,175,80,0.55);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: white;
  display: flex;
}

.pager {
  display: flex; justify-content: space-between;
  padding: 12px 16px;
}

/* 이미지 미리보기 모달 */
#preview-modal {
  display: none;
  position: fixed; inset: 0; z-index: 40;
  background: rgba(0,0,0,0.9);
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px;
  gap: 16px;
}
#preview-modal.open { display: flex; }
#preview-img {
  max-width: 100%; max-height: 60vh;
  object-fit: contain;
  border-radius: 8px;
}
#preview-title {
  font-size: 12px; color: #aaa;
  text-align: center;
  max-width: 90%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.preview-meta {
  width: 100%; display: flex; flex-direction: column; gap: 8px;
}
.preview-meta select, .preview-meta input {
  width: 100%; background: #2a2a2a; color: #f0f0f0;
  border: none; border-radius: 8px; padding: 10px 12px;
  font-size: 14px; outline: none;
}
.preview-btns { display: flex; gap: 10px; width: 100%; }
.preview-btns button { flex: 1; padding: 12px; font-size: 15px; }
#save-btn { background: #4caf50; }

#queue-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #1a1a1a;
  border-top: 1px solid #333;
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  z-index: 20;
}
#queue-count {
  background: #e85d8a; color: white;
  border-radius: 20px; padding: 4px 12px;
  font-size: 13px; font-weight: 700;
}
#queue-label { color: #aaa; font-size: 13px; flex: 1; }
#sync-btn { background: #4caf50; font-size: 13px; padding: 8px 14px; }

.spacer { height: 70px; }

#queue-panel {
  display: none;
  position: fixed; inset: 0;
  background: #141414;
  z-index: 30;
  overflow-y: auto;
  padding-bottom: 80px;
}
#queue-panel header {
  display: flex; align-items: center; gap: 12px;
}
#queue-panel header button { background: #333; }
.queue-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid #222;
}
.queue-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; }
.queue-item .info { flex: 1; font-size: 12px; color: #aaa; }
.queue-item .info b { display: block; color: #f0f0f0; font-size: 13px; margin-bottom: 2px; }
.queue-item .del { background: #c0392b; font-size: 12px; padding: 6px 10px; }

#sync-cmd {
  margin: 12px 16px;
  background: #1e1e1e;
  border-radius: 8px;
  padding: 12px;
  font-family: monospace;
  font-size: 12px;
  color: #4caf50;
  word-break: break-all;
}
</style>
</head>
<body>

<header>
  <h1>브랜드톡 이미지 검색</h1>
  <div class="engine-tabs">
    <button id="tab-naver" class="active" onclick="setEngine('naver')">네이버</button>
    <button id="tab-google" onclick="setEngine('google')">구글</button>
  </div>
  <div class="row">
    <input type="text" id="query" placeholder="검색어 입력" onkeydown="if(event.key==='Enter')search()">
    <button onclick="search()">검색</button>
  </div>
</header>

<div id="status">검색어를 입력하세요</div>
<div class="grid" id="grid"></div>
<div class="pager">
  <button class="sec" onclick="prevPage()">◀ 이전</button>
  <button class="sec" onclick="nextPage()">다음 ▶</button>
</div>
<div class="spacer"></div>

<!-- 이미지 미리보기 모달 -->
<div id="preview-modal">
  <img id="preview-img" src="" alt="">
  <div id="preview-title"></div>
  <div class="preview-meta">
    <select id="modal-episode">
      <option value="">에피소드 선택</option>
    </select>
    <input type="text" id="modal-filename" placeholder="저장명 (예: scene3_매출.jpg)">
  </div>
  <div class="preview-btns">
    <button class="sec" onclick="closePreview()">닫기</button>
    <button id="save-btn" onclick="saveFromModal()">저장</button>
  </div>
</div>

<div id="queue-bar">
  <span id="queue-count">0</span>
  <span id="queue-label">대기 중인 이미지</span>
  <button onclick="showQueue()">목록</button>
  <button id="sync-btn" onclick="showSyncInfo()">Mac 동기화 ↓</button>
</div>

<div id="queue-panel">
  <header>
    <button onclick="hideQueue()">✕</button>
    <h1>대기열</h1>
    <button onclick="clearAll()" style="background:#c0392b;margin-left:auto">전체 삭제</button>
  </header>
  <div id="sync-cmd" style="display:none"></div>
  <div id="queue-list"></div>
</div>

<script>
let currentItems = [];
let pageStart = 1;
let currentQuery = "";
let queueData = [];
let currentEngine = "naver";
let previewIdx = null;

async function loadEpisodes() {
  const res = await fetch("/episodes");
  const eps = await res.json();
  [document.getElementById("modal-episode")].forEach(sel => {
    eps.forEach(ep => {
      const opt = document.createElement("option");
      opt.value = ep.id;
      opt.textContent = ep.label;
      sel.appendChild(opt);
    });
  });
}

function setEngine(engine) {
  currentEngine = engine;
  document.getElementById("tab-naver").classList.toggle("active", engine === "naver");
  document.getElementById("tab-google").classList.toggle("active", engine === "google");
}

async function search(resetPage = true) {
  const q = document.getElementById("query").value.trim();
  if (!q) return;
  if (resetPage) pageStart = 1;
  currentQuery = q;
  setStatus("검색 중...");
  clearGrid();

  const res = await fetch(`/search?q=${encodeURIComponent(q)}&start=${pageStart}&engine=${currentEngine}`);
  const data = await res.json();
  if (!Array.isArray(data)) { setStatus(data.error || "검색 실패"); return; }
  currentItems = data;
  renderGrid(data);
  setStatus(`${data.length}개 결과 (${currentEngine === "naver" ? "네이버" : "구글"}) — 이미지 탭해서 미리보기`);
}

function prevPage() {
  if (pageStart <= 1 || !currentQuery) return;
  pageStart = Math.max(1, pageStart - 9);
  search(false);
}
function nextPage() {
  if (!currentQuery) return;
  pageStart += 9;
  search(false);
}

function clearGrid() {
  document.getElementById("grid").innerHTML = "";
  currentItems = [];
}

function renderGrid(items) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  items.forEach((item, i) => {
    const wrap = document.createElement("div");
    wrap.className = "thumb-wrap";
    wrap.dataset.idx = i;
    wrap.innerHTML = `<img src="${item.thumbnail || item.link}" loading="lazy" onerror="this.src=''">`;
    wrap.onclick = () => openPreview(i, wrap);
    grid.appendChild(wrap);
  });
}

function openPreview(idx, el) {
  previewIdx = idx;
  const item = currentItems[idx];
  document.getElementById("preview-img").src = item.link || item.thumbnail;
  document.getElementById("preview-title").textContent = (item.title || "").replace(/<[^>]+>/g, "");
  document.getElementById("modal-filename").value = "";
  document.getElementById("preview-modal").classList.add("open");
}

function closePreview() {
  document.getElementById("preview-modal").classList.remove("open");
  previewIdx = null;
}

async function saveFromModal() {
  if (previewIdx === null) return;
  const item = currentItems[previewIdx];
  const episodeId = document.getElementById("modal-episode").value;
  const filename = document.getElementById("modal-filename").value.trim() || suggestFilename(item);

  if (!episodeId) { alert("에피소드를 선택하세요"); return; }
  const finalFilename = filename.endsWith(".jpg") || filename.endsWith(".png") ? filename : filename + ".jpg";

  const btn = document.getElementById("save-btn");
  btn.textContent = "저장 중...";
  btn.disabled = true;

  await fetch("/queue", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      url: item.link || item.thumbnail,
      thumbnail: item.thumbnail,
      episode: episodeId,
      filename: finalFilename,
      title: (item.title || "").replace(/<[^>]+>/g, ""),
    })
  });

  // 썸네일에 저장 표시
  const wrap = document.querySelector(`.thumb-wrap[data-idx="${previewIdx}"]`);
  if (wrap) wrap.classList.add("saved");

  btn.textContent = "저장됨 ✓";
  setTimeout(() => {
    btn.textContent = "저장";
    btn.disabled = false;
    closePreview();
  }, 800);

  await refreshQueueCount();
}

function suggestFilename(item) {
  const title = (item.title || "image").replace(/<[^>]+>/g, "").replace(/[^\w가-힣]/g, "_").slice(0, 20);
  return title + ".jpg";
}

async function refreshQueueCount() {
  const res = await fetch("/queue");
  queueData = await res.json();
  document.getElementById("queue-count").textContent = queueData.length;
}

async function showQueue() {
  await refreshQueueCount();
  const list = document.getElementById("queue-list");
  list.innerHTML = "";
  queueData.forEach(item => {
    const div = document.createElement("div");
    div.className = "queue-item";
    div.innerHTML = `
      <img src="${item.thumbnail || ''}" onerror="this.style.display='none'">
      <div class="info">
        <b>${item.filename}</b>
        ${item.episode} / ${item.title || ""}
      </div>
      <button class="del" onclick="removeItem('${item.filename}', this.parentElement)">삭제</button>
    `;
    list.appendChild(div);
  });
  document.getElementById("queue-panel").style.display = "block";
}

async function removeItem(filename, el) {
  await fetch("/queue/remove", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ filename })
  });
  el.remove();
  await refreshQueueCount();
}

function hideQueue() {
  document.getElementById("queue-panel").style.display = "none";
  document.getElementById("sync-cmd").style.display = "none";
}

async function clearAll() {
  if (!confirm("전체 삭제?")) return;
  await fetch("/queue/clear", { method: "POST" });
  await refreshQueueCount();
  document.getElementById("queue-list").innerHTML = "";
}

function showSyncInfo() {
  const box = document.getElementById("sync-cmd");
  box.style.display = "block";
  box.textContent = `# Mac 터미널에서 실행:\ncd ~/Library/Mobile\\ Documents/com~apple~CloudDocs/❗️Life\\ OS/05.\\ Branding/SNS/유튜브/브랜드톡/episodes\npython3 sync.py`;
  showQueue();
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

// 모달 바깥 탭하면 닫기
document.getElementById("preview-modal").addEventListener("click", function(e) {
  if (e.target === this) closePreview();
});

loadEpisodes();
refreshQueueCount();
</script>
</body>
</html>
